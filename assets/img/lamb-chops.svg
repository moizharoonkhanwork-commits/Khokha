<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 480" role="img" aria-label="Grilled lamb chops">
  <defs>
    <radialGradient id="lbg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#fff6e6"/><stop offset="100%" stop-color="#f1e6d2"/>
    </radialGradient>
  </defs>
  <rect width="600" height="480" fill="url(#lbg)"/>
  <!-- plate -->
  <ellipse cx="300" cy="280" rx="220" ry="120" fill="#fff" stroke="#e3d6bd" stroke-width="4"/>
  <ellipse cx="300" cy="280" rx="180" ry="96" fill="#f6efe1"/>
  <!-- chop 1 -->
  <g transform="rotate(-12 250 270)">
    <rect x="150" y="240" width="150" height="64" rx="30" fill="#7a3520"/>
    <rect x="150" y="240" width="150" height="30" rx="15" fill="#9a4a2c"/>
    <!-- grill marks -->
    <line x1="170" y1="248" x2="200" y2="296" stroke="#3c1c12" stroke-width="5"/>
    <line x1="210" y1="248" x2="240" y2="296" stroke="#3c1c12" stroke-width="5"/>
    <line x1="250" y1="248" x2="280" y2="296" stroke="#3c1c12" stroke-width="5"/>
    <!-- bone -->
    <rect x="292" y="258" width="60" height="14" rx="7" fill="#f3ead7"/>
    <circle cx="352" cy="265" r="11" fill="#f3ead7"/>
  </g>
  <!-- chop 2 -->
  <g transform="rotate(8 360 290)">
    <rect x="300" y="258" width="150" height="64" rx="30" fill="#8a3d24"/>
    <rect x="300" y="258" width="150" height="30" rx="15" fill="#a8512f"/>
    <line x1="320" y1="266" x2="350" y2="314" stroke="#3c1c12" stroke-width="5"/>
    <line x1="360" y1="266" x2="390" y2="314" stroke="#3c1c12" stroke-width="5"/>
    <line x1="400" y1="266" x2="430" y2="314" stroke="#3c1c12" stroke-width="5"/>
    <rect x="442" y="276" width="60" height="14" rx="7" fill="#f3ead7"/>
    <circle cx="502" cy="283" r="11" fill="#f3ead7"/>
  </g>
  <!-- mint chutney pot -->
  <ellipse cx="180" cy="340" rx="34" ry="16" fill="#3f8f4f"/>
  <ellipse cx="180" cy="336" rx="30" ry="12" fill="#5fb866"/>
  <!-- garnish -->
  <circle cx="380" cy="350" r="6" fill="#5fa845"/>
  <circle cx="400" cy="356" r="5" fill="#5fa845"/>
  <circle cx="362" cy="356" r="5" fill="#c8432b"/>
</svg>
