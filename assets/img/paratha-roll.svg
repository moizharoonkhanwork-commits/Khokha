<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 480" role="img" aria-label="Paratha roll">
  <defs>
    <radialGradient id="pbg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#fff6e6"/><stop offset="100%" stop-color="#f1e6d2"/>
    </radialGradient>
    <linearGradient id="wrap" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f3d79a"/><stop offset="100%" stop-color="#d9a955"/>
    </linearGradient>
  </defs>
  <rect width="600" height="480" fill="url(#pbg)"/>
  <ellipse cx="300" cy="408" rx="200" ry="32" fill="#000" opacity=".12"/>
  <!-- paper cone -->
  <path d="M210 150 L420 200 L300 440 Z" fill="#faf3e7" stroke="#e3d6bd" stroke-width="3"/>
  <path d="M210 150 L420 200 L300 440 Z" fill="none" stroke="#e3d6bd" stroke-width="2" stroke-dasharray="2 10"/>
  <!-- roll body -->
  <g transform="rotate(-58 300 250)">
    <rect x="180" y="120" width="240" height="150" rx="60" fill="url(#wrap)"/>
    <rect x="180" y="120" width="240" height="150" rx="60" fill="none" stroke="#c97e1c" stroke-width="3"/>
    <!-- char spots -->
    <circle cx="240" cy="170" r="6" fill="#b07d33" opacity=".6"/>
    <circle cx="300" cy="210" r="5" fill="#b07d33" opacity=".6"/>
    <circle cx="350" cy="160" r="7" fill="#b07d33" opacity=".6"/>
    <!-- open top with fillings -->
    <ellipse cx="300" cy="120" rx="120" ry="34" fill="#e9c47a"/>
    <ellipse cx="300" cy="116" rx="112" ry="28" fill="#7a3f25"/>
    <path d="M210 112 q30 -16 60 0 q30 -16 60 0 q30 -16 60 0" fill="none" stroke="#5fa845" stroke-width="9" stroke-linecap="round"/>
    <circle cx="250" cy="104" r="7" fill="#c8432b"/>
    <circle cx="330" cy="100" r="7" fill="#e8a531"/>
    <circle cx="300" cy="108" r="6" fill="#c8432b"/>
  </g>
</svg>
